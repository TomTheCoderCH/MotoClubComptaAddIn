name: Release

# Déclenché sur chaque tag vX.Y.Z poussé sur le dépôt.
# Construit l'installeur Windows et publie une GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # nécessaire pour créer/éditer une GitHub Release

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      # Extrait la section du CHANGELOG correspondant à la version du tag courant.
      # Le résultat est passé comme body à la GitHub Release.
      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = (Get-Content app/package.json | ConvertFrom-Json).version
          $content = Get-Content CHANGELOG.md -Raw -Encoding UTF8
          # Capture tout ce qui est entre "## [X.Y.Z]" et le prochain "## [" ou fin de fichier
          if ($content -match "(?s)## \[$([regex]::Escape($version))\][^\n]*\n(.*?)(?=\n## \[|\z)") {
            $notes = $matches[1].Trim()
          } else {
            $notes = "Version $version"
          }
          # Écriture multilignes dans GITHUB_OUTPUT
          "body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $notes        | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # Crée la GitHub Release avec les notes avant que forge n'uploade les assets.
      # electron-forge publisher-github trouve la release existante et y ajoute les fichiers.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false

      # electron-forge publish trouve la release créée ci-dessus et uploade
      # MCYCompta-Setup.exe, .nupkg et RELEASES (nécessaire pour l'auto-update Squirrel).
      - name: Build and publish
        run: npm run publish
        working-directory: app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
